<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" font-family="Segoe UI, Microsoft JhengHei, PingFang TC, system-ui, sans-serif">
  <!-- window background (light pink theme) -->
  <rect width="640" height="480" fill="#FFF0F5"/>
  <circle cx="320" cy="270" r="150" fill="#F4C2D0" opacity="0.10"/>
  <text x="320" y="288" text-anchor="middle" font-size="120" fill="#F4C2D0" opacity="0.12">&#9829;</text>

  <!-- OS title bar -->
  <rect x="0" y="0" width="640" height="26" fill="#F4C2D0" opacity="0.55"/>
  <text x="10" y="17" font-size="11" fill="#7a3b55">LingoIsland</text>
  <text x="600" y="17" font-size="12" fill="#7a3b55">&#8212; &#9633; &#10005;</text>

  <!-- main tab strip (icon over text, Segoe MDL2 style: monochrome glyphs); 影片 active -->
  <g font-size="9" fill="#8a5a6e" text-anchor="middle">
    <rect x="0" y="26" width="640" height="42" fill="#FFFFFF" opacity="0.45"/>
    <text x="40" y="47" font-size="12">&#9670;</text><text x="40" y="61">主題</text>
    <text x="108" y="47" font-size="12">&#9635;</text><text x="108" y="61">擷取</text>
    <rect x="142" y="28" width="68" height="38" rx="6" fill="#FFFFFF" opacity="0.92"/>
    <text x="176" y="47" font-size="12" fill="#B0578D">&#9654;</text><text x="176" y="61" fill="#B0578D" font-weight="bold">影片</text>
    <text x="244" y="47" font-size="12">&#9633;</text><text x="244" y="61">筆記</text>
    <text x="312" y="47" font-size="12">&#8635;</text><text x="312" y="61">歷史</text>
    <text x="380" y="47" font-size="12">&#9881;</text><text x="380" y="61">選項</text>
    <text x="448" y="47" font-size="12">&#8505;</text><text x="448" y="61">關於</text>
    <text x="596" y="47" font-size="12">&#9776;</text><text x="596" y="61">字典</text>
  </g>

  <!-- sub-tabs: 內容 / 獲得 — 疊放同格、互斥切換；此圖畫【獲得】為使用中 -->
  <g font-size="11">
    <rect x="16" y="76" width="66" height="24" rx="5" fill="#FFFFFF" opacity="0.45" stroke="#F4C2D0"/>
    <text x="49" y="92" text-anchor="middle" fill="#8a5a6e">內容</text>
    <rect x="88" y="76" width="66" height="24" rx="5" fill="#B0578D"/>
    <text x="121" y="92" text-anchor="middle" fill="#ffffff" font-weight="bold">獲得</text>
    <text x="166" y="92" font-size="8.5" fill="#9a8a90">兩子頁籤疊放同格、互斥切換&#8212;&#8212;【獲得】使用中時整幅為獲取卡片，影片清單不在畫面上</text>
  </g>

  <!-- 【獲得】full-width card -->
  <rect x="16" y="108" width="608" height="342" rx="8" fill="#FFFFFF" opacity="0.55" stroke="#F4C2D0"/>
  <text x="30" y="128" font-size="12" fill="#B0578D" font-weight="bold">加入影片</text>
  <text x="30" y="144" font-size="8.5" fill="#9A6A82">貼上影片與字幕檔網址，或直接給本機自製字幕檔（字幕檔可於檔頭自帶影片網址，免打字）。</text>

  <!-- 單一輸入框：常態只有 placeholder，不畫拖放回饋 -->
  <rect x="30" y="154" width="580" height="62" rx="6" fill="#FFFFFF" opacity="0.72" stroke="#F4C2D0"/>
  <g font-size="8.5" fill="#B692A6">
    <text x="40" y="170">貼上影片與字幕連結，例如：</text>
    <text x="40" y="184">影片：https://www.youtube.com/watch?v=&#8230;</text>
    <text x="40" y="198">字幕：https://&#8230;/Transcript　（已選本機字幕檔時此框可留空）</text>
  </g>
  <text x="30" y="230" font-size="8.5" fill="#8A5A6E">也可把字幕檔拖進上面的框（可多檔）&#8212;&#8212;拖曳中才顯示可放置回饋；非支援檔型顯拒收。</text>

  <!-- 選檔鈕 + 已選檔清單（緊鄰同組） -->
  <rect x="30" y="240" width="124" height="26" rx="5" fill="#FFFFFF" opacity="0.9" stroke="#B0578D"/>
  <text x="92" y="257" font-size="10" fill="#B0578D" text-anchor="middle" font-weight="bold">選擇字幕檔&#8230;</text>
  <text x="166" y="257" font-size="9.5" fill="#7a3b55" font-weight="bold">已選 5 檔</text>
  <text x="604" y="257" font-size="9" fill="#B0578D" text-anchor="end">全部清除</text>

  <!-- 清單：固定高度＋捲動；含錯誤態列 -->
  <rect x="30" y="272" width="580" height="106" rx="5" fill="#FFFFFF" opacity="0.42" stroke="#F4C2D0"/>
  <g font-size="9">
    <rect x="36" y="277" width="560" height="22" rx="4" fill="#FFFFFF" opacity="0.75"/>
    <text x="46" y="292" fill="#3a3a3a">peppa_s01e03_best_friend.srt</text>
    <text x="330" y="292" fill="#9a8a90">（自檔頭偵測）</text>
    <text x="440" y="292" fill="#4a7a4a">&#10003; 就緒 &#183; 已取得影片 ID</text>
    <text x="590" y="292" fill="#9a8a90" text-anchor="end">&#10005;</text>

    <rect x="36" y="302" width="560" height="22" rx="4" fill="#FFFFFF" opacity="0.75"/>
    <text x="46" y="317" fill="#3a3a3a">peppa_s01e06_the_playgroup.srt</text>
    <text x="330" y="317" fill="#9a8a90">（自檔頭偵測）</text>
    <text x="440" y="317" fill="#4a7a4a">&#10003; 就緒 &#183; 已取得影片 ID</text>
    <text x="590" y="317" fill="#9a8a90" text-anchor="end">&#10005;</text>

    <rect x="36" y="327" width="560" height="22" rx="4" fill="#FFE9C8" opacity="0.8"/>
    <text x="46" y="342" fill="#3a3a3a">peppa_s01e10_gardening.srt</text>
    <text x="330" y="342" fill="#a07a3a">&#8212;</text>
    <text x="440" y="342" fill="#a06a20" font-weight="bold">&#9888; 缺影片網址&#8212;&#8212;請補於輸入框</text>
    <text x="590" y="342" fill="#9a8a90" text-anchor="end">&#10005;</text>

    <rect x="36" y="352" width="560" height="22" rx="4" fill="#FFE9C8" opacity="0.8"/>
    <text x="46" y="367" fill="#3a3a3a">notes_draft.docx</text>
    <text x="330" y="367" fill="#a07a3a">&#8212;</text>
    <text x="440" y="367" fill="#a06a20" font-weight="bold">&#9888; 不支援的檔案類型</text>
    <text x="590" y="367" fill="#9a8a90" text-anchor="end">&#10005;</text>
  </g>
  <!-- 捲軸意象（第 5 列在下方，需捲動） -->
  <rect x="600" y="277" width="4" height="52" rx="2" fill="#B0578D" opacity="0.45"/>
  <rect x="600" y="277" width="4" height="96" rx="2" fill="#B0578D" opacity="0.14"/>

  <!-- 底列：提示 + 主鈕（文案隨檔數） -->
  <text x="30" y="404" font-size="8.5" fill="#8A5A6E">需要具體影片網址與字幕來源&#8212;&#8212;不做關鍵字搜尋。</text>
  <rect x="424" y="392" width="186" height="28" rx="5" fill="#B0578D"/>
  <text x="517" y="411" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="bold">&#65291; 批次加入 3 部</text>
  <text x="30" y="422" font-size="8" fill="#9a8a90">主鈕文案隨已選檔數變化：0&#8211;1 檔＝「加入並播放」／N 檔＝「批次加入 N 部」（異常列不計入）</text>
  <text x="30" y="440" font-size="8" fill="#9a8a90">按下後先出彙總確認表（逐列可選 加入／覆寫／略過；「需 AI 抽取」列須勾選並合併確認才花費），確認才建立。</text>

  <!-- status bar -->
  <rect x="0" y="462" width="640" height="18" fill="#F4C2D0" opacity="0.5"/>
  <text x="8" y="475" font-size="8.5" fill="#7a3b55">已選 5 檔（3 就緒 &#183; 2 需處理）&#183; 影片網址取自檔頭 &#183; 按下主鈕後才解析，句數與說話人於彙總確認表呈現</text>
  <text x="632" y="475" font-size="8" fill="#8a5a6e" text-anchor="end">清單資料為示意值</text>
</svg>
