<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" font-family="Segoe UI, system-ui, sans-serif">
  <defs>
    <linearGradient id="player" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
  </defs>

  <!-- window background (light pink theme) -->
  <rect width="640" height="480" fill="#FFF0F5"/>
  <!-- faint watermark -->
  <circle cx="320" cy="270" r="150" fill="#F4C2D0" opacity="0.10"/>
  <text x="320" y="285" text-anchor="middle" font-size="120" fill="#F4C2D0" opacity="0.12">♥</text>

  <!-- OS title bar -->
  <rect x="0" y="0" width="640" height="26" fill="#F4C2D0" opacity="0.55"/>
  <text x="10" y="17" font-size="11" fill="#7a3b55">LingoIsland</text>
  <text x="600" y="17" font-size="12" fill="#7a3b55">— □ ✕</text>

  <!-- top tab strip (Office-style, icon over text); Video active -->
  <g font-size="9" fill="#8a5a6e" text-anchor="middle">
    <rect x="0" y="26" width="640" height="42" fill="#FFFFFF" opacity="0.45"/>
    <text x="52" y="46" font-size="14">🖼</text><text x="52" y="61">Capture</text>
    <text x="126" y="46" font-size="14">📒</text><text x="126" y="61">Notes</text>
    <text x="200" y="46" font-size="14">🕘</text><text x="200" y="61">History</text>
    <!-- active: Video -->
    <rect x="238" y="28" width="76" height="38" rx="6" fill="#FFFFFF" opacity="0.9"/>
    <text x="276" y="46" font-size="14" fill="#B0578D">🎬</text><text x="276" y="61" fill="#B0578D" font-weight="bold">Video</text>
    <text x="352" y="46" font-size="14">⚙</text><text x="352" y="61">Options</text>
    <text x="426" y="46" font-size="14">ℹ</text><text x="426" y="61">About</text>
  </g>

  <!-- URL bar -->
  <g>
    <rect x="16" y="80" width="500" height="30" rx="6" fill="#FFFFFF" opacity="0.66" stroke="#F4C2D0"/>
    <text x="28" y="99" font-size="12" fill="#9a8a90">Paste a YouTube link or ID…</text>
    <rect x="524" y="80" width="100" height="30" rx="6" fill="#B0578D"/>
    <text x="574" y="100" font-size="12" fill="#ffffff" text-anchor="middle" font-weight="bold">Load</text>
  </g>

  <!-- LEFT: subtitle list -->
  <text x="16" y="132" font-size="11" fill="#7a3b55" font-weight="bold">Subtitles</text>
  <rect x="16" y="138" width="228" height="322" rx="8" fill="#FFFFFF" opacity="0.55"/>
  <g font-size="11" fill="#3a3a3a">
    <rect x="24" y="146" width="212" height="34" rx="5" fill="#FFFFFF" opacity="0.6"/>
    <text x="34" y="167">Once upon a time, in a…</text>
    <rect x="24" y="184" width="212" height="34" rx="5" fill="#B0578D" opacity="0.16" stroke="#B0578D"/>
    <text x="34" y="205" fill="#7a3b55" font-weight="bold">You must venture beyond…</text>
    <rect x="24" y="222" width="212" height="34" rx="5" fill="#FFFFFF" opacity="0.6"/>
    <text x="34" y="243">the ancient forest gate.</text>
    <rect x="24" y="260" width="212" height="34" rx="5" fill="#FFFFFF" opacity="0.6"/>
    <text x="34" y="281">Take this enchanted map…</text>
    <rect x="24" y="298" width="212" height="34" rx="5" fill="#FFFFFF" opacity="0.6"/>
    <text x="34" y="319">and trust your instincts.</text>
    <rect x="24" y="336" width="212" height="34" rx="5" fill="#FFFFFF" opacity="0.6"/>
    <text x="34" y="357">The journey will be long.</text>
    <rect x="24" y="374" width="212" height="34" rx="5" fill="#FFFFFF" opacity="0.6"/>
    <text x="34" y="395">But you are not alone now.</text>
  </g>
  <text x="130" y="450" font-size="9" fill="#9a8a90" text-anchor="middle">click a line to jump</text>

  <!-- RIGHT: player -->
  <rect x="256" y="138" width="368" height="182" rx="8" fill="url(#player)"/>
  <circle cx="440" cy="229" r="26" fill="#ff0000" opacity="0.92"/>
  <path d="M432 217 L432 241 L453 229 Z" fill="#ffffff"/>
  <rect x="256" y="304" width="368" height="16" rx="3" fill="#333"/>
  <rect x="256" y="304" width="150" height="16" rx="3" fill="#ff0000" opacity="0.85"/>
  <text x="266" y="160" font-size="9" fill="#cccccc">YouTube (WebView2 · IFrame Player API)</text>

  <!-- subtitle band with clickable words + add to notes -->
  <rect x="256" y="330" width="368" height="98" rx="8" fill="#FFFFFF" opacity="0.72" stroke="#F4C2D0"/>
  <text x="266" y="350" font-size="9" fill="#B0578D" font-weight="bold">⏸ paused — current line (tap a word to look it up)</text>
  <g font-size="14" fill="#2a2a2a">
    <text x="266" y="378">You must</text>
    <text x="330" y="378" fill="#B0578D" text-decoration="underline" font-weight="bold">venture</text>
    <text x="392" y="378">beyond the</text>
    <text x="470" y="378" fill="#B0578D" text-decoration="underline" font-weight="bold">ancient</text>
    <text x="530" y="378">gate.</text>
  </g>
  <!-- controls -->
  <g font-size="11" fill="#7a3b55">
    <rect x="266" y="392" width="34" height="26" rx="5" fill="#FFFFFF" opacity="0.7"/><text x="283" y="409" text-anchor="middle">⏮</text>
    <rect x="304" y="392" width="34" height="26" rx="5" fill="#FFFFFF" opacity="0.7"/><text x="321" y="409" text-anchor="middle">▶</text>
    <rect x="342" y="392" width="34" height="26" rx="5" fill="#FFFFFF" opacity="0.7"/><text x="359" y="409" text-anchor="middle">⏭</text>
    <rect x="470" y="392" width="146" height="26" rx="6" fill="#B0578D"/>
    <text x="543" y="409" text-anchor="middle" fill="#ffffff" font-weight="bold">＋ Add to Notes</text>
  </g>

  <!-- status bar -->
  <rect x="0" y="462" width="640" height="18" fill="#F4C2D0" opacity="0.5"/>
  <text x="8" y="475" font-size="9" fill="#7a3b55">Subtitles loaded · 42 lines · click a word to look up (reuses screen-capture query &amp; notes)</text>
</svg>
