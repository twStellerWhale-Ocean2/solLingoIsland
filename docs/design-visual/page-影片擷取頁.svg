<svg xmlns="http://www.w3.org/2000/svg" width="640" height="480" viewBox="0 0 640 480" font-family="Segoe UI, Microsoft JhengHei, PingFang TC, system-ui, sans-serif">
  <defs>
    <linearGradient id="player" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <pattern id="dropstripe" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="none"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#B0578D" stroke-width="1" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- window background (light pink theme) -->
  <rect width="640" height="480" fill="#FFF0F5"/>
  <!-- faint watermark -->
  <circle cx="320" cy="270" r="150" fill="#F4C2D0" opacity="0.10"/>
  <text x="320" y="288" text-anchor="middle" font-size="120" fill="#F4C2D0" opacity="0.12">&#9829;</text>

  <!-- OS title bar -->
  <rect x="0" y="0" width="640" height="26" fill="#F4C2D0" opacity="0.55"/>
  <text x="10" y="17" font-size="11" fill="#7a3b55">LingoIsland</text>
  <text x="600" y="17" font-size="12" fill="#7a3b55">&#8212; &#9633; &#10005;</text>

  <!-- main tab strip (Office-style, icon over text); 影片 active -->
  <g font-size="9" fill="#8a5a6e" text-anchor="middle">
    <rect x="0" y="26" width="640" height="42" fill="#FFFFFF" opacity="0.45"/>
    <text x="40" y="46" font-size="13">&#9733;</text><text x="40" y="61">主題</text>
    <text x="108" y="46" font-size="13">&#128444;</text><text x="108" y="61">擷取</text>
    <!-- active: 影片 -->
    <rect x="142" y="28" width="68" height="38" rx="6" fill="#FFFFFF" opacity="0.92"/>
    <text x="176" y="46" font-size="13" fill="#B0578D">&#127916;</text><text x="176" y="61" fill="#B0578D" font-weight="bold">影片</text>
    <text x="244" y="46" font-size="13">&#128210;</text><text x="244" y="61">筆記</text>
    <text x="312" y="46" font-size="13">&#128336;</text><text x="312" y="61">歷史</text>
    <text x="380" y="46" font-size="13">&#9881;</text><text x="380" y="61">選項</text>
    <text x="448" y="46" font-size="13">&#8505;</text><text x="448" y="61">關於</text>
    <text x="596" y="46" font-size="13">&#128214;</text><text x="596" y="61">字典</text>
  </g>

  <!-- sub-tab strip: 內容 / 獲得 (獲得 active) -->
  <g font-size="11">
    <rect x="16" y="76" width="66" height="24" rx="5" fill="#FFFFFF" opacity="0.45" stroke="#F4C2D0"/>
    <text x="49" y="92" text-anchor="middle" fill="#8a5a6e">內容</text>
    <rect x="88" y="76" width="66" height="24" rx="5" fill="#B0578D"/>
    <text x="121" y="92" text-anchor="middle" fill="#ffffff" font-weight="bold">獲得</text>
  </g>

  <!-- ===== LEFT: 【獲得】card (active surface, this increment) ===== -->
  <rect x="16" y="108" width="372" height="342" rx="8" fill="#FFFFFF" opacity="0.55" stroke="#F4C2D0"/>
  <text x="28" y="128" font-size="12" fill="#B0578D" font-weight="bold">加入影片</text>
  <g font-size="8.5" fill="#9A6A82">
    <text x="28" y="144">貼上影片與字幕檔網址，或直接給本機自製字幕檔。字幕檔可自帶</text>
    <text x="28" y="156">影片網址（免打字）。自帶時間戳者免費解析、不花 OpenAI 額度。</text>
  </g>

  <!-- 單一輸入框（含拖放區意象） -->
  <rect x="28" y="164" width="348" height="86" rx="6" fill="#FFFFFF" opacity="0.72" stroke="#F4C2D0"/>
  <rect x="28" y="164" width="348" height="86" rx="6" fill="url(#dropstripe)"/>
  <g font-size="8.5" fill="#B692A6">
    <text x="38" y="180">貼上影片與字幕連結，例如：</text>
    <text x="38" y="194">影片：https://www.youtube.com/watch?v=&#8230;</text>
    <text x="38" y="208">字幕：https://&#8230;/Transcript</text>
  </g>
  <g text-anchor="middle">
    <text x="202" y="232" font-size="10" fill="#B0578D" font-weight="bold">&#8595; 或將字幕檔拖放至此（可多檔）</text>
  </g>

  <!-- 選擇字幕檔按鈕 + 已選檔列 -->
  <rect x="28" y="258" width="120" height="26" rx="5" fill="#FFFFFF" opacity="0.85" stroke="#B0578D"/>
  <text x="88" y="275" font-size="10" fill="#B0578D" text-anchor="middle" font-weight="bold">&#128196; 選擇字幕檔&#8230;</text>
  <text x="160" y="275" font-size="9" fill="#7a3b55">已選 3 檔（自檔內偵測到影片網址）</text>

  <g font-size="9">
    <rect x="28" y="290" width="348" height="22" rx="4" fill="#FFFFFF" opacity="0.7"/>
    <text x="38" y="305" fill="#3a3a3a">peppa_s01e03_best_friend.srt</text>
    <text x="268" y="305" fill="#5a8a5a">&#9679; E2MPOr2g0zg</text>
    <text x="366" y="305" fill="#9a8a90" text-anchor="end">&#10005;</text>

    <rect x="28" y="316" width="348" height="22" rx="4" fill="#FFFFFF" opacity="0.7"/>
    <text x="38" y="331" fill="#3a3a3a">peppa_s01e06_the_playgroup.srt</text>
    <text x="268" y="331" fill="#5a8a5a">&#9679; 4pQ8dU2mA1c</text>
    <text x="366" y="331" fill="#9a8a90" text-anchor="end">&#10005;</text>

    <rect x="28" y="342" width="348" height="22" rx="4" fill="#FFFFFF" opacity="0.7"/>
    <text x="38" y="357" fill="#3a3a3a">peppa_s01e10_gardening.srt</text>
    <text x="268" y="357" fill="#5a8a5a">&#9679; 7bXqL0nR9tY</text>
    <text x="366" y="357" fill="#9a8a90" text-anchor="end">&#10005;</text>
  </g>

  <!-- 多檔彙總確認提示 -->
  <rect x="28" y="372" width="348" height="34" rx="5" fill="#F4C2D0" opacity="0.28" stroke="#F4C2D0"/>
  <text x="38" y="386" font-size="8.5" fill="#7a3b55" font-weight="bold">多檔＝批次加入：按下後先出彙總確認表（逐檔列句數／說話人／時長），</text>
  <text x="38" y="399" font-size="8.5" fill="#7a3b55">確認才建立並加入【內容】清單，不自動播放；已存在者略過、不觸發 AI。</text>

  <!-- 底列：提示 + 加入影片鈕 -->
  <text x="28" y="428" font-size="8.5" fill="#C89AB0">需要具體影片網址與字幕來源&#8212;&#8212;不做關鍵字搜尋。</text>
  <rect x="256" y="416" width="120" height="26" rx="5" fill="#B0578D"/>
  <text x="316" y="433" font-size="11" fill="#ffffff" text-anchor="middle" font-weight="bold">&#9881; 加入影片</text>

  <!-- ===== RIGHT: 【內容】pane preview (unchanged by this increment, dimmed) ===== -->
  <g opacity="0.42">
    <rect x="398" y="108" width="226" height="342" rx="8" fill="#FFFFFF" opacity="0.5" stroke="#F4C2D0" stroke-dasharray="4 3"/>
    <rect x="408" y="120" width="206" height="104" rx="6" fill="url(#player)"/>
    <circle cx="511" cy="172" r="17" fill="#ff0000" opacity="0.9"/>
    <path d="M505 163 L505 181 L520 172 Z" fill="#ffffff"/>
    <rect x="408" y="230" width="206" height="42" rx="5" fill="#FFFFFF" opacity="0.8" stroke="#F4C2D0"/>
    <text x="416" y="245" font-size="8" fill="#B0578D" font-weight="bold">&#9208; 到句暫停&#8212;&#8212;點詞即查</text>
    <text x="416" y="262" font-size="11" fill="#2a2a2a">Peppa：<tspan fill="#B0578D" font-weight="bold">venture</tspan> beyond&#8230;</text>
    <g font-size="8.5" fill="#3a3a3a">
      <rect x="408" y="280" width="206" height="20" rx="4" fill="#FFFFFF" opacity="0.7"/>
      <text x="416" y="294">Peppa：I&#8217;m Peppa Pig.</text>
      <rect x="408" y="304" width="206" height="20" rx="4" fill="#FFFFFF" opacity="0.7"/>
      <text x="416" y="318">Suzy：Hello, Peppa.</text>
      <rect x="408" y="328" width="206" height="20" rx="4" fill="#FFFFFF" opacity="0.7"/>
      <text x="416" y="342">Narrator：They are best&#8230;</text>
      <rect x="408" y="352" width="206" height="20" rx="4" fill="#FFFFFF" opacity="0.7"/>
      <text x="416" y="366">Sound：(BOTH LAUGH)</text>
    </g>
    <rect x="408" y="380" width="206" height="58" rx="5" fill="#FFFFFF" opacity="0.7"/>
    <text x="416" y="394" font-size="8" fill="#7a3b55" font-weight="bold">說話人勾選面板</text>
    <g font-size="8" fill="#3a3a3a">
      <text x="416" y="408">&#9745; （全部說話人）</text>
      <text x="416" y="420">&#9745; Peppa　&#9745; Suzy　&#9744; Sound</text>
      <text x="416" y="432" fill="#9a8a90">合唸句 Peppa/Suzy 拆為原子說話人</text>
    </g>
  </g>
  <text x="511" y="460" font-size="8.5" fill="#9a8a90" text-anchor="middle">【內容】子頁籤（切換後顯示，本增量不改）</text>

  <!-- status bar -->
  <rect x="0" y="462" width="640" height="18" fill="#F4C2D0" opacity="0.5"/>
  <text x="8" y="475" font-size="8.5" fill="#7a3b55">3 個字幕檔已就緒 &#183; 自檔內取得影片網址 &#183; 免費解析、未使用 AI &#183; 按「加入影片」開始批次加入</text>
</svg>
