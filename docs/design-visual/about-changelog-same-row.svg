<svg xmlns="http://www.w3.org/2000/svg" width="440" height="230" viewBox="0 0 440 230" font-family="Segoe UI, Microsoft JhengHei, sans-serif">
  <!-- #216 關於頁「更新紀錄」鈕與更新區併為同一列：預覽（版面示意；實機外觀待 USR 手測） -->
  <rect x="0" y="0" width="440" height="230" fill="#FDF5F8"/>
  <!-- About 卡 -->
  <rect x="12" y="12" width="416" height="206" rx="8" fill="#FBFCFF" stroke="#F4C2D0" stroke-width="1"/>
  <!-- 左：logo -->
  <rect x="30" y="40" width="72" height="72" rx="10" fill="#FCE4EC" stroke="#F4C2D0"/>
  <text x="66" y="83" font-size="11" fill="#B0578D" text-anchor="middle">logo</text>
  <!-- 右：資訊欄 -->
  <text x="122" y="46" font-size="17" font-weight="600" fill="#B0578D">LingoIsland</text>
  <text x="122" y="66" font-size="12" fill="#9A6A82">版本 v3.11.1</text>
  <text x="122" y="86" font-size="11.5" fill="#9A6A82">© 2026 Carlton Chen．保留一切權利。</text>
  <text x="122" y="104" font-size="11" fill="#B0578D">GitHub</text>

  <!-- 同一列：更新區（可隱）＋更新紀錄鈕（恆顯） -->
  <g>
    <text x="122" y="150" font-size="12" fill="#9A6A82">已是最新版本</text>
    <rect x="212" y="138" width="76" height="24" rx="5" fill="#FFF" stroke="#F4C2D0"/>
    <text x="250" y="154" font-size="12" fill="#B0578D" text-anchor="middle">檢查更新</text>
    <rect x="296" y="138" width="76" height="24" rx="5" fill="#FFF" stroke="#F4C2D0"/>
    <text x="334" y="154" font-size="12" fill="#B0578D" text-anchor="middle">更新紀錄</text>
  </g>
  <text x="122" y="184" font-size="9.5" fill="#B692A6">↑ #216：同一列——更新區（僅安裝版顯示）之後接「更新紀錄」；</text>
  <text x="122" y="200" font-size="9.5" fill="#B692A6">　 dev 裸跑無更新區時「更新紀錄」自然靠列首、仍恆顯</text>
</svg>
